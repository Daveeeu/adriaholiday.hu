server {
  listen 80;
  server_name _;

  root /var/www/backend/public;
  index index.php index.html;
  client_max_body_size 64m;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 1024;

  location = /favicon.ico {
    access_log off;
    log_not_found off;
  }

  location = /robots.txt {
    try_files $uri /robots.txt =404;
    access_log off;
    log_not_found off;
  }

  # The portfolio Vite build's outDir is backend/public/portfolio (not
  # backend/public directly), so its copied public/ files — including this
  # manual — land under portfolio/, even though we serve it at /docs.
  location = /docs {
    alias /var/www/backend/public/portfolio/docs.html;
    default_type text/html;
  }

  location ^~ /docs/img/ {
    alias /var/www/backend/public/portfolio/docs/img/;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location ^~ /storage/ {
    alias /var/www/backend/storage/app/public/;
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location ^~ /admin/assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location ^~ /portfolio/assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  location = /health {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    fastcgi_pass app:9000;
  }

  location = /up {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    fastcgi_pass app:9000;
  }

  location ~ \.php$ {
    try_files $uri /index.php =404;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    fastcgi_param HTTPS $http_x_forwarded_proto;
    fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
    fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    fastcgi_param HTTP_X_FORWARDED_HOST $host;
    fastcgi_pass app:9000;
    fastcgi_read_timeout 300;
  }

  location ~ /\.(?!well-known).* {
    deny all;
  }
}
